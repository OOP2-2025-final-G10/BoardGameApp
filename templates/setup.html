<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人生ゲーム - 参加登録</title>
    
</head>
<body>
    <div class="setup-container">
        <aside class="member-sidebar box-border">
            <h2 class="sidebar-title">メンバー</h2>
            <ul id="memberDisplayList" class="member-ul">
                </ul>
        </aside>

        <main class="setup-main">
            <header class="page-header">
                <div class="title-box box-border">
                    <h1>人生ゲーム</h1>
                </div>
            </header>

            <div class="registration-area">
                <div class="input-group">
                    <input type="text" id="userNameInput" placeholder="名前を入力してください" class="box-border">
                    <button onclick="addMember()" class="join-btn box-border">参加</button>
                </div>
            </div>

            <div class="footer-area">
                <a href="{{ url_for('game') }}" class="start-btn box-border">START</a>
            </div>
        </main>
    </div>

    <script>
        function addMember() {
            const input = document.getElementById('userNameInput');
            const list = document.getElementById('memberDisplayList');
            const name = input.value.trim();

            if (name !== "") {
                const li = document.createElement('li');
                li.textContent = "・ " + name; // 先頭に中黒をつける
                li.className = "member-item";
                list.appendChild(li);
                input.value = "";
                input.focus();
            }
        }

        // Enterキー入力にも対応
        document.getElementById('userNameInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                addMember();
            }
        });
    </script>
</body>
</html>
